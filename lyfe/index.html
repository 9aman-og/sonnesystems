<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<title>Lyfe</title>
<script>
/* apply saved theme before first paint - light=Crystal, dark=Orbit, auto=by clock
   (legacy "day"/"night" values from older backups still resolve) */
(function () {
  var set = "light";   // default to Crystal light for the landing + login
  try {
    var d = JSON.parse(localStorage.getItem("lyfe.v1"));
    if (d && d.settings && d.settings.theme) set = d.settings.theme;
  } catch (e) { /* default light */ }
  var mode;
  if (set === "day" || set === "light") mode = "light";
  else if (set === "night" || set === "dark") mode = "dark";
  else { var h = new Date().getHours(); mode = (h >= 7 && h < 18) ? "light" : "dark"; }
  document.documentElement.setAttribute("data-theme", mode);
  document.addEventListener("DOMContentLoaded", function () {
    var meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute("content", mode === "light" ? "#e9f1fb" : "#050505");
  });
})();
</script>
<link rel="icon" type="image/png" href="favicon-32.png?v=crystal-28">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=crystal-28">

<!-- installable Android / PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#050505">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lyfe">
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- warm up the photo pipes so Wander and the daily calm land faster -->
<link rel="preconnect" href="https://en.wikipedia.org" crossorigin>
<link rel="dns-prefetch" href="https://upload.wikimedia.org">
<link rel="dns-prefetch" href="https://picsum.photos">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Unbounded:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="styles.css?v=crystal-28">
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>
<div id="scroll-progress" aria-hidden="true"></div>
<div id="stars" aria-hidden="true"></div>
<div id="bg-glow" aria-hidden="true"></div>

<div id="app">
  <aside id="sidebar">
    <nav id="nav" aria-label="Sections"></nav>
    <div class="side-foot">
      <button class="linklike" data-action="export">Export</button>
      <span class="sep">·</span>
      <button class="linklike" data-action="import">Import</button>
      <span class="sep">·</span>
      <button class="linklike" data-action="settings">Settings</button>
      <span class="sep" id="signin-sep">·</span>
      <button class="linklike signin-link" id="signin-link" data-action="sign-in-gate">Sign in</button>
      <input type="file" id="importFile" accept=".json,application/json" hidden>
    </div>
  </aside>
  <main id="main" tabindex="-1"></main>
</div>

<div id="auth-gate" hidden role="dialog" aria-modal="true" aria-label="Sign in to Lyfe">
  <div class="auth-card">
    <div class="auth-mark" aria-hidden="true">
      <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round">
        <circle cx="32" cy="32" r="10"/>
        <path d="M32 6v6M32 52v6M6 32h6M52 32h6M13 13l4 4M47 47l4 4M13 51l4-4M47 17l4-4"/>
      </svg>
    </div>
    <h1 class="auth-title">Lyfe</h1>
    <p class="auth-tag">your life, lightly kept</p>
    <button class="auth-btn auth-google" data-action="auth-google" type="button">
      <svg class="g-logo" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </button>
    <button class="auth-btn auth-guest" data-action="auth-guest" type="button">Continue as guest</button>
    <p class="auth-fine">Guest keeps everything on this device. Sign in to sync privately across your devices.</p>
  </div>
</div>

<div id="onboard-gate" hidden role="dialog" aria-modal="true" aria-label="Set up your Lyfe"></div>

<div id="modal-root"></div>
<div id="toast-root" role="status" aria-live="polite" aria-atomic="true"></div>
<script src="supabase-config.js?v=crystal-28"></script>
<script src="cloud.js?v=crystal-28"></script>
<script src="app.js?v=crystal-28"></script>
<script>
/* register the service worker so Lyfe installs + runs offline on Android.
   only over http/https (not file://). */
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("sw.js").catch(function () { /* offline install optional */ });
  });
}
</script>
</body>
</html>
